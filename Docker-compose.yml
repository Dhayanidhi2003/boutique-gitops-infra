version: '3.8'

services:
  # The Backend API Service
  backend-api:
    build: ./backend
    container_name: ecommerce-backend
    ports:
      - "5000:5000"
    networks:
      - ecommerce-network

  # The Frontend Web Service
  frontend-web:
    build: ./app-source
    container_name: ecommerce-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend-api
    networks:
      - ecommerce-network

# Create a private network so the containers can talk to each other safely
networks:
  ecommerce-network:
    driver: bridge